<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAYMAP</title>

  <!--Google Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!--DAYMAP Styles-->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!--PARSER (chrono-node CDN)-->
  <script src="https://cdn.jsdelivr.net/npm/chrono-node@2.7.0/dist/chrono.min.js"></script>
</head>
<body>

  <!-- HEADER -->
   <header id="app-header">
    <div id="header-left">
        <div id="logo-mark">
        <img src="images/daymap-logo.png" alt="DAYMAP Logo" id="logo-image" width="35"> 
        </div>
      <div id="logo">DAYMAP</div>
    </div>

    <div id="current-date"></div>

    <div id="settings-icon" aria-label="Settings">
      <i data-lucide="settings" width="22" height="22"></i>
    </div>
   </header>

   <!--MAIN CONTENT-->
   <main id="app-main">
    <!-- LEFT PANEL (TIMELINE)-->
    <section id="timeline-panel">
      <div id="timeline-header">
        <h2>Today's Schedule</h2>
        <span id="task-count">0 tasks</span>
      </div>
      <div id="task-list">
        <div id="add-task-card" role="button" tabindex="0" aria-label="Add a new task">
        <div id="add-task-card-icon">
          <i data-lucide="plus" width="18" height="18"></i>
        </div>
        <span id="add-task-label">Add Task</span>
      </div>
      </div>    
    </section>

    <!-- RIGHT PANEL (MAP + TASK SHEET)-->
    <section id="map-panel">
      <div id="map-controls">
        <div id="mode-toggle">
          <button id ="drive-button" class="mode-button active">
            <i data-lucide="car" width="15" height="15"></i>
            Drive</button>
          <button id="transit-button" class="mode-button">
            <i data-lucide="bus" width="15" height="15"></i>
            Transit</button>
          </div>
        <button id="plan-route-button">
          <i data-lucide="map-pin" width="15" height="15"></i>
          Plan My Route</button>
      </div>
      <div id="map-wrapper">
        <div id="map"></div>
      </div>

      <div id="sheet-overlay"></div>

      <div id="add-task-sheet" aria-hidden="true">
        <div class="sheet-inner">
          <div class="sheet-handle"></div>
          <div class="sheet-inner">
            <!-- Top row -->
             <div class="sheet-top-row">
              <h3 class="sheet-title">New Task</h3>
              <button class="sheet-close-button" id="sheet-close" aria-label="Close">
                <i data-lucide="x" width="18" height="18"></i>
              </button>
            </div>
            <!-- Quick-add natural language input -->
             <div class="quick-add-row">
              <input type="text" id="quick-add-input" class="sheet-input"
              placeholder="Type your task" autocomplete="off"/>
              <button id="quick-parse-btn" class="quick-parse-btn">→</button>
            </div>
            <div class="quick-add-divider"><span>or fill manually</span></div>
            <!-- Recent task chips -->
             <div id="recent-chips" style="display:none;"></div>
             <!-- Category pills -->
              <div class="category-uis">
                <button class="category-ui selected" data-cat="assignment">Assignment</button>
                <button class="category-ui" data-cat="work">Work</button>
                <button class="category-ui" data-cat="event">Event</button>
                <button class="category-ui" data-cat="errand">Errand</button>
                <button class="category-ui" data-cat="personal">Personal</button>
              </div>
              <!-- Task title -->
               <input class="sheet-input" type="text" placeholder="Task title" id="sheet-title" autocomplete="off"/>
               <!-- Custom Date + Time pickers side by side -->
                <div class="pickers-row">
                  <!-- DATE PICKER -->
                   <div class="custom-date-picker" id="custom-date-picker">
                    <button class="date-arrow" id="date-prev" aria-label="Previous day">&#8592;</button>
                    <div id="date-display">—</div>
                    <button class="date-arrow" id="date-next" aria-label="Next day">&#8594;</button>
                  </div>
                  <!-- TIME PICKER -->
                   <div class="custom-time-picker" id="custom-time-picker">
                    <!-- Hour drum -->
                     <div class="time-drum">
                      <button class="time-drum-btn" id="hour-up" aria-label="Hour up">▲</button>
                      <span class="time-drum-value" id="time-hour">12</span>
                      <button class="time-drum-btn" id="hour-down" aria-label="Hour down">▼</button>
                    </div>
                    <span class="time-separator">:</span>
                    <!-- Minute drum -->
                     <div class="time-drum">
                      <button class="time-drum-btn" id="min-up" aria-label="Minute up">▲</button>
                      <span class="time-drum-value" id="time-minute">00</span>
                      <button class="time-drum-btn" id="min-down" aria-label="Minute down">▼</button>
                    </div>
                    <!-- AM/PM toggle -->
                     <button id="period-toggle" aria-label="Toggle AM/PM">
                      <span id="time-period">PM</span>
                    </button>
                  </div>
                </div><!-- /pickers-row -->
                <!-- Location (autocomplete="off" removes browser underline) -->
                 <div class="sheet-location-wrap">
                  <input class="sheet-input" type="text" placeholder="Search location (optional)"
                  id="sheet-location" autocomplete="off" autocorrect="off" spellcheck="false"/>
                  <div id="location-suggestions"></div>
                </div>
                <!-- Priority scroller -->
                 <div class="priority-scroller">
                  <span class="priority-scroller-label">Priority</span>
                  <div class="priority-scroller-row">
                    <button id="priority-prev" class="priority-arrow" aria-label="Lower priority">&#8592;</button>
                    <div id="priority-track" data-priority="medium">
                      <!-- Snap point dots -->
                       <div class="priority-dot-high"></div>
                       <div class="priority-dot-med"></div>
                       <div class="priority-dot-low"></div>
                       <!-- Draggable handle -->
                        <div id="priority-handle"></div>
                      </div>
                      <button id="priority-next" class="priority-arrow" aria-label="Higher priority">&#8594;</button>
                      <span id="priority-label">Medium</span>
                    </div>
                  </div>
                  <!-- Notes -->
                   <textarea class="sheet-input" rows="2" placeholder="Notes (optional)" id="sheet-notes"></textarea>
                   <!-- Save -->
                    <button class="sheet-save-button" id="sheet-save">Add to Schedule</button>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </main>
        <!-- Leaflet.js -->
         <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- DAYMAP SCRIPTS-->
     <script src="js/data.js"></script>
     <script src="js/tasks.js"></script>
     <script src="js/timeline.js"></script>
     <script src="js/parser.js"></script>
     <script src="js/sheet.js"></script>
     <script src="js/map.js"></script>
     <script src="js/app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>

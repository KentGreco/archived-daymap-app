<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAYMAP</title>

  <!--Google Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!--DAYMAP Styles-->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- HEADER -->
   <header id="app-header">
    <div id="header-left">
        <div id="logo-mark">
        <img src="images/logo.png" alt="DAYMAP Logo" id="logo-image" width="35"> 
        </div>
      <div id="logo">DAYMAP</div>
    </div>

    <div id="current-date"></div>

    <div id="settings-icon" aria-label="Settings">
      <i data-lucide="settings" width="22" height="22"></i>
    </div>
   </header>

   <!--MAIN CONTENT-->
   <main id="app-main">
    <!-- LEFT PANEL (TIMELINE)-->
    <section id="timeline-panel">
      <div id="timeline-header">
        <h2>Today's Schedule</h2>
        <span id="task-count">0 tasks</span>
      </div>
      <div id="task-list">
        <!--Task cards render here-->
      </div>    
      <!-- ADD TASK CARD-->
       <div id="add-task-card" role="button" tabindex="0" aria-label="Add a new task">
        <div id="add-task-card-icon">
          <i data-lucide="plus" width="18" height="18"></i>
        </div>
        <span id="add-task-label">Add Task</span>
      </div>
    </section>

    <!-- RIGHT PANEL (MAP + TASK SHEET)-->
    <section id="map-panel">
      <div id="map-controls">
        <div id="mode-toggle">
          <button id ="drive-button" class="mode-button active">
            <i data-lucide="car" width="15" height="15"></i>
            Drive</button>
          <button id="transit-button" class="mode-button">
            <i data-lucide="bus" width="15" height="15"></i>
            Transit</button>
          </div>
        <button id="plan-route-button">
          <i data-lucide="map-pin" width="15" height="15"></i>
          Plan My Route</button>
      </div>
      <div id="map-wrapper">
        <div id="map"></div>
      </div>

      <div id="sheet-overlay"></div>

      <div id="add-task-sheet" aria-hidden="true">
        <div class="sheet-handle"></div>
        <div class="sheet-inner">
          <div class="sheet-top-row">
            <h3 class="sheet-title">New Task</h3>
            <button class="sheet-close-button" id="sheet-close" aria-label="Close">
              <i data-lucide="x" width="18" height="18"></i>
            </button>
          </div>
          <div class="category-uis">
            <button class="category-ui selected" data-cat="assignment">Assignment</button>
            <button class="category-ui" data-cat="work">Work</button>
            <button class="category-ui" data-cat="event">Event</button>
            <button class="category-ui" data-cat="errand">Errand</button>
            <button class="category-ui" data-cat="personal">Personal</button>
          </div>

          <input class="sheet-input" type="text" placeholder="Task title" id="sheet-title"/>
          <div class="sheet-row">
            <input class="sheet-input half" type="date" id="sheet-date"/>
            <input class="sheet-input half" type="time" id="sheet-time"/>
          </div>

          <div class="sheet-location-wrap">
            <input class="sheet-input" type="text" placeholder="Search location (optional)" id="sheet-location"/>
            
            <div id="location-suggestions"></div>
            </div>

            <div class="sheet-row">
              <select class="sheet-input half" id="sheet-priority">
                <option value="">Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          <textarea class="sheet-input" rows="2" placeholder="Notes (optional)" id="sheet-notes"></textarea>
          <button class="sheet-save-button" id="sheet-save">Add to Schedule</button>
        </div>
        </div>
      </div>
    </section>


   </main>

    <!-- Leaflet.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- DAYMAP SCRIPTS-->
     <script src="js/utils.js"></script>
     <script src="js/data.js"></script>
     <script src="js/tasks.js"></script>
     <script src="js/map.js"></script>
     <script src="js/router.js"></script>
     <script src="js/transit.js"></script>
     <script src="js/nominatim.js"></script>
     <script src="js/tasks.js"></script>
     <script src="js/timeline.js"></script>
     <script src="js/notifications.js"></script>
     <script src="js/app.js"></script>
     <script src="js/pins.js"></script>
     <script src="js/sheet.js"></script>
     <script>lucide.createIcons();</script>
</body>
</html>
